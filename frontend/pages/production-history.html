<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production History</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        body { background-color: #f4f6f9; }

        #sidebar {
            min-height: 100vh;
            background-color: #1e2a3a;
            color: #fff;
        }
        #sidebar .brand {
            padding: 1.25rem 1rem;
            font-size: 1.4rem;
            font-weight: 700;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        #sidebar .nav-link {
            color: #c9d2dc;
            padding: 0.65rem 1rem;
            border-radius: 0.375rem;
            margin: 0.15rem 0.5rem;
        }
        #sidebar .nav-link:hover,
        #sidebar .nav-link.active {
            background-color: #2c3e50;
            color: #fff;
        }
        .table-responsive table { margin-bottom: 0; }
    </style>
</head>

<body>

<div class="d-flex">

    <!-- Sidebar -->
    <nav id="sidebar" class="offcanvas-md offcanvas-start" tabindex="-1" id="sidebarOffcanvas">
        <div class="brand d-flex justify-content-between align-items-center">
            <span>Chef Bisu</span>
            <button type="button" class="btn-close btn-close-white d-md-none" data-bs-dismiss="offcanvas" data-bs-target="#sidebarOffcanvas"></button>
        </div>
        <ul class="nav flex-column py-2">
            <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-house-door me-2"></i>Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="production.html"><i class="bi bi-building me-2"></i>Production</a></li>
            <li class="nav-item"><a class="nav-link active" href="production-history.html"><i class="bi bi-clipboard-data me-2"></i>Production History</a></li>
            <li class="nav-item"><a class="nav-link" href="transfer.html"><i class="bi bi-truck me-2"></i>Transfer</a></li>
            <li class="nav-item"><a class="nav-link" href="transfer-history.html"><i class="bi bi-clipboard-data me-2"></i>Transfer History</a></li>
            <li class="nav-item"><a class="nav-link" href="stock.html"><i class="bi bi-box-seam me-2"></i>Stock</a></li>
            <li class="nav-item"><a class="nav-link" href="reports.html"><i class="bi bi-bar-chart me-2"></i>Reports</a></li>
            <li class="nav-item"><a class="nav-link" href="users.html"><i class="bi bi-people me-2"></i>Users</a></li>
            <li class="nav-item"><a class="nav-link" href="settings.html"><i class="bi bi-gear me-2"></i>Settings</a></li>
        </ul>
    </nav>

    <!-- Main content -->
    <div class="flex-grow-1">

        <div class="bg-white border-bottom px-3 py-2 d-flex justify-content-between align-items-center sticky-top">
            <div class="d-flex align-items-center gap-2">
                <button class="btn btn-outline-secondary d-md-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarOffcanvas">
                    <i class="bi bi-list"></i>
                </button>
                <h1 class="h4 mb-0">Production History</h1>
            </div>
            <div class="d-flex align-items-center gap-3">
                <span><i class="bi bi-person-circle me-1"></i>Admin</span>
                <button id="logoutBtn" class="btn btn-primary btn-sm">Logout</button>
            </div>
        </div>

        <div class="p-3">

            <div class="card shadow-sm">
                <div class="card-body">

                    <div class="d-flex flex-wrap justify-content-between align-items-center mb-3 gap-2">
                        <h2 class="h5 mb-0">Production History</h2>
                        <span class="badge bg-primary-subtle text-primary-emphasis fs-6">
                            <i class="bi bi-box-seam me-1"></i>Total Records: <span id="totalRecords">0</span>
                        </span>
                    </div>

                    <div class="row g-2 mb-3">
                        <div class="col-6 col-md-3">
                            <input type="date" id="searchDate" class="form-control">
                        </div>
                        <div class="col-6 col-md-4">
                            <input type="text" id="searchItem" class="form-control" placeholder="Search Item Name">
                        </div>
                        <div class="col-6 col-md-2">
                            <button class="btn btn-primary w-100" onclick="searchByDate()">Search</button>
                        </div>
                        <div class="col-6 col-md-2">
                            <button class="btn btn-outline-secondary w-100" onclick="loadHistory()">Show All</button>
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-bordered table-sm align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Date</th>
                                    <th>Item</th>
                                    <th>Qty</th>
                                    <th>Unit</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="historyTableBody"></tbody>
                        </table>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/production-history.js"></script>
<script src="../js/admin-edit-requests.js"></script>

</body>
</html>
