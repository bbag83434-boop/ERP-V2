<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        body { background-color: #f4f6f9; }

        #sidebarOffcanvas {
            min-height: 100vh;
            background-color: #1e2a3a;
            color: #fff;
        }
        #sidebarOffcanvas .brand {
            padding: 1.25rem 1rem;
            font-size: 1.4rem;
            font-weight: 700;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        #sidebarOffcanvas .nav-link {
            color: #c9d2dc;
            padding: 0.65rem 1rem;
            border-radius: 0.375rem;
            margin: 0.15rem 0.5rem;
        }
        #sidebarOffcanvas .nav-link:hover,
        #sidebarOffcanvas .nav-link.active {
            background-color: #2c3e50;
            color: #fff;
        }
        .table-responsive table { margin-bottom: 0; }
    </style>
</head>

<body>

<div class="d-flex">

    <!-- Sidebar -->
    <nav id="sidebarOffcanvas" class="offcanvas-md offcanvas-start" tabindex="-1">
        <div class="brand d-flex justify-content-between align-items-center">
            <span>Chef Bisu</span>
            <button type="button" class="btn-close btn-close-white d-md-none" data-bs-dismiss="offcanvas" data-bs-target="#sidebarOffcanvas"></button>
        </div>
        <ul class="nav flex-column py-2">
            <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-house-door me-2"></i>Dashboard</a></li>
            <li class="nav-item"><a class="nav-link active" href="production.html"><i class="bi bi-building me-2"></i>Production</a></li>
            <li class="nav-item"><a class="nav-link" href="production-history.html"><i class="bi bi-clipboard-data me-2"></i>Production History</a></li>
            <li class="nav-item"><a class="nav-link" href="transfer.html"><i class="bi bi-truck me-2"></i>Transfer</a></li>
            <li class="nav-item"><a class="nav-link" href="transfer-history.html"><i class="bi bi-clipboard-data me-2"></i>Transfer History</a></li>
            <li class="nav-item"><a class="nav-link" href="stock.html"><i class="bi bi-box-seam me-2"></i>Stock</a></li>
            <li class="nav-item"><a class="nav-link" href="reports.html"><i class="bi bi-bar-chart me-2"></i>Reports</a></li>
            <li class="nav-item"><a class="nav-link" href="users.html"><i class="bi bi-people me-2"></i>Users</a></li>
            <li class="nav-item"><a class="nav-link" href="settings.html"><i class="bi bi-gear me-2"></i>Settings</a></li>
        </ul>
    </nav>

    <!-- Main content -->
    <div class="flex-grow-1">

        <div class="bg-white border-bottom px-3 py-2 d-flex align-items-center gap-2 sticky-top">
            <button class="btn btn-outline-secondary d-md-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarOffcanvas">
                <i class="bi bi-list"></i>
            </button>
            <h1 class="h4 mb-0">Production Entry</h1>
        </div>

        <div class="p-3">

            <div class="card shadow-sm">
                <div class="card-body">

                    <div class="row g-2 mb-3">
                        <div class="col-12 col-md-4 col-lg-3">
                            <label class="form-label">Production Date</label>
                            <input type="date" id="productionDate" class="form-control">
                        </div>
                    </div>

                    <div class="table-responsive mb-3">
                        <table class="table table-bordered table-sm align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>#</th>
                                    <th>Item</th>
                                    <th>Quantity</th>
                                    <th>Unit</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="productionRows"></tbody>
                        </table>
                    </div>

                    <div class="d-flex flex-wrap gap-2">
                        <button type="button" id="addRowBtn" class="btn btn-outline-primary">
                            <i class="bi bi-plus-lg me-1"></i>Add Row
                        </button>
                        <button id="saveBtn" class="btn btn-primary">
                            <i class="bi bi-save me-1"></i>Save Production
                        </button>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="../js/production.js"></script>

</body>
</html>
