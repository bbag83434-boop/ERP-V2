<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Supplier Master</title>

<link rel="stylesheet" href="../css/supplier-master.css">

</head>

<body>

<div class="container">

<div class="header">

<h1>Supplier Master</h1>

<button id="saveSupplierBtn">
Save Supplier
</button>

</div>

<div class="form-grid">

<div>

<label>Supplier Name</label>

<input type="text" id="supplierName">

</div>

<div>

<label>Contact Person</label>

<input type="text" id="contactPerson">

</div>

<div>

<label>Mobile</label>

<input type="text" id="mobile">

</div>

<div>

<label>Email</label>

<input type="email" id="email">

</div>

<div>

<label>GSTIN</label>

<input type="text" id="gstin">

</div>

<div>

<label>Address</label>

<input type="text" id="address">

</div>

<div>

<label>City</label>

<input type="text" id="city">

</div>

<div>

<label>State</label>

<input type="text" id="state">

</div>

<div>

<label>Pincode</label>

<input type="text" id="pincode">

</div>

<div>

<label>Status</label>

<select id="status">

<option value="ACTIVE">ACTIVE</option>

<option value="INACTIVE">INACTIVE</option>

</select>

</div>

</div>

<br>

<table>

<thead>

<tr>

<th>Code</th>

<th>Supplier</th>

<th>Mobile</th>

<th>GSTIN</th>

<th>City</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody id="supplierTableBody">

</tbody>

</table>

</div>

<script src="../js/supplier-master.js"></script>

</body>

</html>
